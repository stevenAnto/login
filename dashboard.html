<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>Esclavos</h1>

    <div class="top">

        <div class="card">

            <img id="foto">

            <h2 id="nombre"></h2>

            <p id="correo"></p>

            <button id="logout">
                Cerrar sesión
            </button>

        </div>



        <div class="card">

    <h2>Mi resumen</h2>

    <div class="resumen">

        <div class="resumen-card">
            <span>Total registros</span>
            <h3 id="totalResumen">0</h3>
        </div>

        <div class="resumen-card">
            <span>Veces cargado</span>
            <h3 id="registrosResumen">0</h3>
        </div>

    </div>

</div>


    <div class="card">

        <h2>Nuevo registro</h2>

        <div class="form">

            <input
                type="number"
                id="valor"
                placeholder="Ingrese un valor">

            <button id="guardar">
                Guardar
            </button>

        </div>

    </div>


    <div class="card">

        <h2>Usuarios</h2>

        <table>

            <thead>

                <tr>

                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Total registros</th>
                    <th>Veces cargados</th>

                </tr>

            </thead>

            <tbody id="tablaUsuarios">

            </tbody>

        </table>

    </div>

</div>

    

    <script src="dashboard.js"></script>

</body>

</html>
